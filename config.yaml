# Live Avatar runtime configuration.
# Edit and restart, or POST to /config to update at runtime.

tts:
  voice: am_michael        # male: am_adam, am_michael, bm_george, bm_lewis
                           # female: af_heart, af_sky, bf_emma, bf_isabella
  speed: 1.0               # 0.5–2.0
  language: a              # 'a' = American English, 'b' = British English

enhancer:
  enabled: false           # GFPGAN face restoration — disable for low latency (~0.26s/frame overhead)
                           # set true for quality; requires `uv add gfpgan`
  model_path: experiments/pretrained_models/GFPGANv1.4.pth  # v1.3 and v1.4 both work

chunking:
  enabled: true            # phrase-level streaming for low time-to-first-frame
  min_chars: 5             # minimum chars before a soft (clause) boundary flushes

avatar:
  cache_dir: ./cache/avatars
  bbox_shift: 0
  extra_margin: 10

unet:
  batch_size: 4
  fps: 25
  use_float16: true
  compile: false           # cudagraphs re-captures per unique batch shape — disable for consistent latency
  audio_padding_left: 2
  audio_padding_right: 2

server:
  host: 0.0.0.0
  port: 7860
